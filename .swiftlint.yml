excluded:
  - Sources/Pods
  - Sandbox/Pods
  - .build
  - .swiftpm
  - DerivedData
  - docs

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - implicit_return
  - joined_default_parameter
  - last_where
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo
  - trailing_comma

# Adoption progressive : ces règles remontent des vrais problèmes sur le code existant.
# On les garde en warning pour ne pas casser le build tant qu'elles n'ont pas été
# nettoyées, puis on pourra repasser en `error` une fois le code assaini.
force_cast: warning

line_length:
  warning: 150
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length: 2
  validates_start_with_lowercase: warning
  excluded:
    - id
    - to
    - at

reporter: xcode

# iOS CircleCI 2.0 configuration file
# https://circleci.com/docs/configuration-reference/
#
# For XCode build version available
# https://circleci.com/docs/using-macos/
#
# Setup Cocoapod session/token on CircleCi: https://fuller.li/posts/automated-cocoapods-releases-with-ci/
version: 2.1

check_sdk_version: &check_sdk_version
  name: Check SdkVersion.swift is in sync with version.rb
  command: |
    EXPECTED=$(ruby -r ./version.rb -e 'puts $VERSION')
    ACTUAL=$(grep -oE '"[^"]+"' Sources/Core/Classes/SdkVersion.swift | tr -d '"')
    if [ "$EXPECTED" != "$ACTUAL" ]; then
      echo "SdkVersion.swift ($ACTUAL) is out of sync with version.rb ($EXPECTED). Run ./set_version.sh and commit the result."
      exit 1
    fi
    echo "SdkVersion.swift is in sync with version.rb ($EXPECTED)"

jobs:
  build:
    macos:
      xcode: "16.4.0"
    steps:
      - checkout
      - run: *check_sdk_version
      - run:
          name: Install CocoaPods
          command: gem install cocoapods --user-install
      - run:
          name: Check Reach5
          command: |
            cd Sources
            pod install
            cd ../
            pod lib lint Reach5.podspec
  build-for-release:
    macos:
      xcode: "16.4.0"
    steps:
      - checkout
      - run: *check_sdk_version
      - run:
          name: Install CocoaPods
          command: gem install cocoapods --user-install
      - run:
          name: Check Reach5
          command: |
            cd Sources
            pod install
            cd ../
            pod spec lint Reach5.podspec
  publish:
    macos:
      xcode: "16.4.0"
    steps:
      - checkout
      - run:
          name: Install CocoaPods
          command: gem install cocoapods --user-install
      - run: pod trunk push Reach5.podspec
  check-doc-examples:
    macos:
      xcode: "16.4.0"
    steps:
      - checkout
      - run:
          name: Type-check the documentation code examples against the API
          command: bash docs/verification/check.sh
      - store_artifacts:
          path: docs/verification/report.md
          destination: doc-examples-report.md
  build-sandbox:
    macos:
      xcode: "16.4.0"
    working_directory: ~/repo/Sandbox
    steps:
      - checkout:
          path: ~/repo
      - run:
          name: Install CocoaPods
          command: gem install cocoapods --user-install
      - run: pod install
      - run: fastlane scan

default_workflows_filters: &default_workflows_filters
  filters:
    tags:
      only: /.*/
    branches:
      ignore: /.*/

default_workflows_tags: &default_workflows_tags
  filters:
    tags:
      only: /.*/

# For the doc-examples check we want PR feedback only, not every push. CircleCI
# filters can't test "is a PR" directly, so we run on all branches except the
# base branch (and not on tags). Combined with the project setting
# "Only build pull requests" (Project Settings › Advanced, set in the CircleCI
# UI — not expressible here), this effectively limits the job to PR branches.
pull_request_branches: &pull_request_branches
  filters:
    branches:
      ignore: master

workflows:
  version: 2
  build-and-deploy:
    jobs:
      - build:
          <<: *default_workflows_tags
      - check-doc-examples:
          <<: *pull_request_branches
      - build-for-release:
          <<: *default_workflows_filters
      - publish:
          requires:
            - build-for-release
          <<: *default_workflows_filters
